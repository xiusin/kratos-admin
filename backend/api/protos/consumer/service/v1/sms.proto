syntax = "proto3";

package consumer.service.v1;

import "gnostic/openapi/v3/annotations.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";
import "google/api/field_behavior.proto";
import "validate/validate.proto";
import "pagination/v1/pagination.proto";

// 短信服务
service SMSService {
  // 发送验证码
  rpc SendVerificationCode (SendVerificationCodeRequest) returns (google.protobuf.Empty) {
    option (gnostic.openapi.v3.operation) = {
      operation_id: "sendVerificationCode"
      tags: "SMS"
      summary: "发送验证码"
      description: "发送短信验证码到指定手机号"
    };
  }

  // 验证验证码
  rpc VerifyCode (VerifyCodeRequest) returns (VerifyCodeResponse) {
    option (gnostic.openapi.v3.operation) = {
      operation_id: "verifyCode"
      tags: "SMS"
      summary: "验证验证码"
      description: "验证短信验证码是否正确"
    };
  }

  // 发送通知短信
  rpc SendNotification (SendNotificationRequest) returns (google.protobuf.Empty) {
    option (gnostic.openapi.v3.operation) = {
      operation_id: "sendNotification"
      tags: "SMS"
      summary: "发送通知短信"
      description: "发送通知类短信"
    };
  }

  // 查询短信日志
  rpc ListSMSLogs (pagination.PagingRequest) returns (ListSMSLogsResponse) {
    option (gnostic.openapi.v3.operation) = {
      operation_id: "listSMSLogs"
      tags: "SMS"
      summary: "查询短信日志"
      description: "分页查询短信发送日志"
    };
  }
}

// 发送验证码 - 请求
message SendVerificationCodeRequest {
  string phone = 1 [
    (google.api.field_behavior) = REQUIRED,
    (validate.rules).string = {min_len: 11, max_len: 20},
    json_name = "phone",
    (gnostic.openapi.v3.property) = {description: "手机号"}
  ];

  optional string scene = 2 [
    (validate.rules).string = {max_len: 50},
    json_name = "scene",
    (gnostic.openapi.v3.property) = {description: "使用场景（注册、登录、修改手机号等）"}
  ];
}

// 验证验证码 - 请求
message VerifyCodeRequest {
  string phone = 1 [
    (google.api.field_behavior) = REQUIRED,
    (validate.rules).string = {min_len: 11, max_len: 20},
    json_name = "phone",
    (gnostic.openapi.v3.property) = {description: "手机号"}
  ];

  string code = 2 [
    (google.api.field_behavior) = REQUIRED,
    (validate.rules).string = {len: 6, pattern: "^[0-9]{6}$"},
    json_name = "code",
    (gnostic.openapi.v3.property) = {description: "验证码"}
  ];
}

// 验证验证码 - 响应
message VerifyCodeResponse {
  bool valid = 1 [
    json_name = "valid",
    (gnostic.openapi.v3.property) = {description: "是否有效"}
  ];

  optional string message = 2 [
    json_name = "message",
    (gnostic.openapi.v3.property) = {description: "验证消息"}
  ];
}

// 发送通知短信 - 请求
message SendNotificationRequest {
  string phone = 1 [
    (google.api.field_behavior) = REQUIRED,
    (validate.rules).string = {min_len: 11, max_len: 20},
    json_name = "phone",
    (gnostic.openapi.v3.property) = {description: "手机号"}
  ];

  string template_code = 2 [
    (google.api.field_behavior) = REQUIRED,
    (validate.rules).string = {max_len: 50},
    json_name = "templateCode",
    (gnostic.openapi.v3.property) = {description: "短信模板代码"}
  ];

  map<string, string> params = 3 [
    json_name = "params",
    (gnostic.openapi.v3.property) = {description: "模板参数"}
  ];
}

// 短信日志
message SMSLog {
  // 短信类型
  enum SMSType {
    VERIFICATION = 0;  // 验证码
    NOTIFICATION = 1;  // 通知
  }

  // 短信通道
  enum Channel {
    ALIYUN = 0;   // 阿里云
    TENCENT = 1;  // 腾讯云
  }

  // 发送状态
  enum Status {
    PENDING = 0;  // 待发送
    SUCCESS = 1;  // 成功
    FAILED = 2;   // 失败
  }

  optional uint64 id = 1 [
    json_name = "id",
    (gnostic.openapi.v3.property) = {description: "日志ID"}
  ];

  optional uint32 tenant_id = 2 [
    json_name = "tenantId",
    (gnostic.openapi.v3.property) = {description: "租户ID"}
  ];

  optional string phone = 3 [
    json_name = "phone",
    (gnostic.openapi.v3.property) = {description: "手机号"}
  ];

  optional SMSType sms_type = 4 [
    json_name = "smsType",
    (gnostic.openapi.v3.property) = {description: "短信类型"}
  ];

  optional string content = 5 [
    json_name = "content",
    (gnostic.openapi.v3.property) = {description: "短信内容"}
  ];

  optional string code = 6 [
    json_name = "code",
    (gnostic.openapi.v3.property) = {description: "验证码"}
  ];

  optional Channel channel = 7 [
    json_name = "channel",
    (gnostic.openapi.v3.property) = {description: "短信通道"}
  ];

  optional Status status = 8 [
    json_name = "status",
    (gnostic.openapi.v3.property) = {description: "发送状态"}
  ];

  optional string error_message = 9 [
    json_name = "errorMessage",
    (gnostic.openapi.v3.property) = {description: "错误信息"}
  ];

  optional google.protobuf.Timestamp sent_at = 10 [
    json_name = "sentAt",
    (gnostic.openapi.v3.property) = {description: "发送时间"}
  ];

  optional google.protobuf.Timestamp expires_at = 11 [
    json_name = "expiresAt",
    (gnostic.openapi.v3.property) = {description: "过期时间"}
  ];
}

// 查询短信日志 - 响应
message ListSMSLogsResponse {
  repeated SMSLog items = 1 [
    json_name = "items",
    (gnostic.openapi.v3.property) = {description: "短信日志列表"}
  ];

  uint64 total = 2 [
    json_name = "total",
    (gnostic.openapi.v3.property) = {description: "总数"}
  ];
}
