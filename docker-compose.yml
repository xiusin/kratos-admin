version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: admin
        APP_VERSION: 1.0.0
    ports:
      - "8000:8000"
      - "9000:9000"
    environment:
      - KRATOS_SERVICE_NAME=admin
      - KRATOS_SERVICE_VERSION=1.0.0
    volumes:
      - ./backend/app/admin/service/configs:/app/configs:ro
    restart: unless-stopped
    networks:
      - kratos-network

networks:
  kratos-network:
    driver: bridge
